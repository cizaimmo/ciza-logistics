<script>

let map;
let driverMarkers = {};
let shipmentMarkers = {};
let routeLines = [];
let heatmapCells = {};

function initMap(){

map = L.map('map').setView([-3.36,29.35],7);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{maxZoom:19}
).addTo(map);

}

initMap();


/* ================================
   ETA CALCULATION
================================ */

function calculateETA(distanceKm,speed){

if(!speed || speed <= 0) speed = 40;

let hours = distanceKm / speed;

let minutes = Math.round(hours * 60);

return minutes;

}


/* ================================
   DISTANCE CALCULATION
================================ */

function distanceKm(lat1,lng1,lat2,lng2){

let R = 6371;

let dLat = (lat2-lat1)*Math.PI/180;
let dLng = (lng2-lng1)*Math.PI/180;

let a =
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLng/2)*Math.sin(dLng/2);

let c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}


/* ================================
   DRIVER MARKER
================================ */

function updateDriver(driver){

let loc = driver.liveLocation;

if(!loc) return;

let marker = driverMarkers[driver.id];

if(!marker){

marker = L.marker([loc.lat,loc.lng]).addTo(map);

driverMarkers[driver.id] = marker;

}

marker.setLatLng([loc.lat,loc.lng]);

let speed = loc.speed || 0;
let active = driver.activeShipments || 0;

marker.bindPopup(

"<b>"+driver.fullName+"</b><br>"+
"Speed: "+speed+" km/h<br>"+
"Active shipments: "+active

);

}


/* ================================
   SHIPMENT MARKER
================================ */

function updateShipment(shipment){

let loc = shipment.lastDriverLocation;

if(!loc) return;

let marker = shipmentMarkers[shipment.id];

if(!marker){

marker = L.circleMarker(
[loc.lat,loc.lng],
{radius:8}
).addTo(map);

shipmentMarkers[shipment.id] = marker;

}

marker.setLatLng([loc.lat,loc.lng]);

let driver = shipment.assignedDriverName || "-";

marker.bindPopup(

"<b>"+shipment.trackingCode+"</b><br>"+
"Driver: "+driver

);

}


/* ================================
   ROUTE DRAWING
================================ */

function drawRoute(driver,shipment){

if(!driver.liveLocation) return;
if(!shipment.destinationLocation) return;

let start = [
driver.liveLocation.lat,
driver.liveLocation.lng
];

let end = [
shipment.destinationLocation.lat,
shipment.destinationLocation.lng
];

let line = L.polyline(
[start,end],
{color:"#00AEEF",weight:3}
).addTo(map);

routeLines.push(line);

let dist = distanceKm(
start[0],
start[1],
end[0],
end[1]
);

let eta = calculateETA(dist,driver.liveLocation.speed);

line.bindPopup(
"Distance: "+dist.toFixed(1)+" km<br>"+
"ETA: "+eta+" min"
);

}


/* ================================
   HEATMAP SYSTEM
================================ */

function updateHeatmap(lat,lng){

let key =
Math.round(lat*10)+"_"+Math.round(lng*10);

if(!heatmapCells[key]) heatmapCells[key]=0;

heatmapCells[key]++;

let count = heatmapCells[key];

let color = "green";

if(count>10) color="red";
else if(count>5) color="orange";

L.circle(
[lat,lng],
{
radius:4000,
color:color,
fillOpacity:0.2
}
).addTo(map);

}

</script><script>

/* ======================================
   SMART DISPATCH ENGINE
====================================== */

function computeDriverScore(driver,shipment){

let score = 0;

/* distance */
if(driver.liveLocation && shipment.pickupLocation){

let dist = distanceKm(
driver.liveLocation.lat,
driver.liveLocation.lng,
shipment.pickupLocation.lat,
shipment.pickupLocation.lng
);

score += dist * 2;

}

/* workload */
let active = driver.activeShipments || 0;

score += active * 10;

/* availability */
if(driver.isAvailable === false){

score += 1000;

}

return score;

}


/* ======================================
   AUTO ASSIGN DRIVER V2
====================================== */

async function smartAssignDriver(shipmentId){

if(!isAdmin){
toast("Lecture seule");
return;
}

let shipment = allShipments.find(s=>s.id===shipmentId);

if(!shipment){
toast("Shipment introuvable");
return;
}

let drivers = allDrivers.filter(d=>{

let role = (d.role||"").toLowerCase();

return role === "driver";

});

if(!drivers.length){
toast("Aucun chauffeur");
return;
}

let bestDriver = null;
let bestScore = 999999;

for(let d of drivers){

let score = computeDriverScore(d,shipment);

if(score < bestScore){

bestScore = score;
bestDriver = d;

}

}

if(!bestDriver){

toast("Impossible d'assigner");
return;

}

await updateDoc(
doc(db,"shipments",shipmentId),
{
assignedDriverId: bestDriver.id,
assignedDriverName: bestDriver.fullName || "Driver",
status:"assigned",
assignedAt: serverTimestamp()
}
);

toast("Chauffeur assigné automatiquement");

}


/* ======================================
   ADMIN FORCE DELIVERY
====================================== */

async function forceDelivery(shipmentId){

if(!isAdmin){
toast("Lecture seule");
return;
}

await updateDoc(
doc(db,"shipments",shipmentId),
{
status:"delivered",
forced:true,
forcedAt:serverTimestamp()
}
);

toast("Livraison forcée");

}

function renderEnterpriseDashboard(){

/* ======================================
   LOGISTICS ANALYTICS ENGINE
====================================== */

function renderAdvancedAnalytics(){

let container = document.getElementById("analyticsList");

if(!container) return;

let totalShipments = allShipments.length;

let delivered = 0;
let transit = 0;

let driverStats = {};

let zoneStats = {};

for(let s of allShipments){

/* status */

if(s.status === "delivered") delivered++;

if(
s.status === "in_transit" ||
s.status === "assigned" ||
s.status === "picked_up"
){
transit++;
}

/* driver performance */

let driver = s.assignedDriverName || s.assignedDriverId;

if(driver){

if(!driverStats[driver]){

driverStats[driver] = {
total:0,
delivered:0
};

}

driverStats[driver].total++;

if(s.status === "delivered"){
driverStats[driver].delivered++;
}

}

/* zones */

let zone =
s.toCity ||
s.toProvince ||
s.to ||
"Zone";

if(!zoneStats[zone]){
zoneStats[zone] = 0;
}

zoneStats[zone]++;

}

/* best drivers */

let bestDrivers =
Object.keys(driverStats)
.map(name=>{

let d = driverStats[name];

return {
name:name,
score:d.delivered
};

})
.sort((a,b)=>b.score-a.score)
.slice(0,5);


/* zones actives */

let activeZones =
Object.keys(zoneStats)
.map(z=>{

return {
zone:z,
count:zoneStats[z]
};

})
.sort((a,b)=>b.count-a.count)
.slice(0,5);


/* render */

container.innerHTML = `

<div class="item">

<b>Total shipments</b>

<div style="margin-top:8px">

<span class="pill2 gold">
${totalShipments}
</span>

</div>

</div>

<div class="item">

<b>Delivered</b>

<div style="margin-top:8px">

<span class="pill2 good">
${delivered}
</span>

</div>

</div>

<div class="item">

<b>In transit</b>

<div style="margin-top:8px">

<span class="pill2 gray">
${transit}
</span>

</div>

</div>

<div class="item">

<b>Top drivers</b>

<div style="margin-top:8px">

${bestDrivers.map(d=>`

<div>
${d.name} — ${d.score}
</div>

`).join("")}

</div>

</div>

<div class="item">

<b>Zones actives</b>

<div style="margin-top:8px">

${activeZones.map(z=>`

<div>
${z.zone} — ${z.count}
</div>

`).join("")}

</div>

</div>

`;

}

/* ======================================
   ERP MAIN ENGINE
====================================== */

function startERP(){

/* render modules */

renderDriversOnMap();

renderMapShipments();

renderDriverMonitoring();

renderEnterpriseDashboard();

renderAdvancedAnalytics();

updateHeatmapFromShipments();

}


/* ======================================
   SHIPMENT MAP RENDER
====================================== */

function renderMapShipments(){

for(let s of allShipments){

updateShipment(s);

/* heatmap */

if(s.destinationLocation){

updateHeatmap(
s.destinationLocation.lat,
s.destinationLocation.lng
);

}

/* route */

let driver = allDrivers.find(
d=>d.id === s.assignedDriverId
);

if(driver){

drawRoute(driver,s);

}

}

}


/* ======================================
   HEATMAP FROM SHIPMENTS
====================================== */

function updateHeatmapFromShipments(){

for(let s of allShipments){

if(!s.destinationLocation) continue;

updateHeatmap(
s.destinationLocation.lat,
s.destinationLocation.lng
);

}

}


/* ======================================
   FIRESTORE LISTENERS
====================================== */

function startRealtimeListeners(){

onSnapshot(
query(collection(db,"shipments")),
(snap)=>{

allShipments = [];

snap.forEach(doc=>{
allShipments.push({
id:doc.id,
...doc.data()
});
});

startERP();

}
);

onSnapshot(
query(collection(db,"users")),
(snap)=>{

allDrivers = [];

snap.forEach(doc=>{
allDrivers.push({
id:doc.id,
...doc.data()
});
});

renderDriversOnMap();
renderDriverMonitoring();

}
);

onSnapshot(
query(collection(db,"reports")),
(snap)=>{

allReports = [];

snap.forEach(doc=>{
allReports.push({
id:doc.id,
...doc.data()
});
});

}

);

onSnapshot(
query(collection(db,"payments")),
(snap)=>{

allPayments = [];

snap.forEach(doc=>{
allPayments.push({
id:doc.id,
...doc.data()
});
});

renderAdvancedAnalytics();

}

);

}


/* ======================================
   START SYSTEM
====================================== */

startRealtimeListeners();
