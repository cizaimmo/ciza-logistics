<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#000000">

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<title>Ciza Driver</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
:root{
  --gold:#D4AF37;
  --black:#000;
  --bg:#f3f4f6;
  --card:#fff;
  --muted:#6b7280;

  --ok:#16a34a;
  --warn:#f59e0b;
  --bad:#dc2626;
  --blue:#2563eb;
  --purple:#7c3aed;
}

*{box-sizing:border-box}
body{margin:0;font-family:Inter;background:var(--bg);color:#111;}
a{color:inherit}

.header{
  background:rgba(0,0,0,0.96);
  color:#fff;
  padding:14px 14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:10;
  backdrop-filter: blur(10px);
}

.brand{color:var(--gold);font-weight:900;font-size:16px;line-height:1.1;}
.driverName{font-size:12px;color:#e5e7eb;margin-top:4px;}

.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}

.badge{
  padding:6px 12px;
  border-radius:999px;
  font-weight:900;
  font-size:12px;
  background:var(--ok);
  color:#fff;
  white-space:nowrap;
}

.badge.warn{background:var(--warn);color:#000;}
.badge.bad{background:var(--bad);color:#fff;}
.badge.gold{background:var(--gold);color:#000;}
.badge.dark{background:#111;color:#fff;}
.badge.blue{background:var(--blue);color:#fff;}
.badge.purple{background:var(--purple);color:#fff;}

.logout-btn{
  background:var(--gold);
  border:none;
  padding:7px 12px;
  border-radius:12px;
  font-weight:900;
  cursor:pointer;
}

.container{width:95%;max-width:1100px;margin:16px auto 80px auto;}

.card{
  background:var(--card);
  border-radius:18px;
  padding:16px;
  margin:14px 0;
  box-shadow:0 12px 26px rgba(0,0,0,0.06);
}

.section-title{
  font-weight:900;
  margin:0 0 10px 0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.small{font-size:12px;color:var(--muted)}
.hr{height:1px;background:rgba(0,0,0,0.08);margin:12px 0}

.grid{
  display:grid;
  grid-template-columns: 1fr;
  gap:14px;
}
@media(min-width:900px){
  .grid{grid-template-columns: 1.1fr 0.9fr;}
}

.shipment-card{
  border:1px solid rgba(212,175,55,0.35);
  border-radius:16px;
  padding:14px;
  margin:10px 0;
  background:linear-gradient(180deg,#fff,#fafafa);
  cursor:pointer;
}

.shipment-card.selected{
  border:2px solid var(--gold);
  background:#fffdf6;
  box-shadow:0 0 0 2px rgba(212,175,55,0.3);
}

.shipment-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
}

.track{
  font-weight:900;
}

.actionsRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}

.btn{
  border:none;
  border-radius:14px;
  padding:12px 14px;
  font-weight:900;
  cursor:pointer;
}

.btn.full{width:100%;}
.btn.dark{background:#111;color:#fff;}
.btn.gold{background:var(--gold);color:#000;}
.btn.ghost{background:rgba(0,0,0,0.06);color:#111;}

#map{height:280px;border-radius:16px;margin-top:10px;}

</style>
</head>

<body>

<div class="header">
  <div>
    <div class="brand">🚚 Ciza Driver</div>
    <div class="driverName" id="driverName">Chargement...</div>
  </div>

  <div class="header-right">
    <span class="badge" id="connectionStatus">En ligne</span>
    <span class="badge" id="gpsStatus">GPS OK</span>
    <span class="badge gold" id="deliveryCounter">0</span>
    <button class="logout-btn" id="logoutBtn">Déconnexion</button>
  </div>
</div>

<div class="container">

<div class="grid">

<div>

<div class="card">
<div class="section-title">
<span>🟡 À traiter</span>
<span class="badge blue" id="countAssigned">0</span>
</div>
<div id="assignedList"></div>
</div>

<div class="card">
<div class="section-title">
<span>🔵 En transit</span>
<span class="badge purple" id="countTransit">0</span>
</div>
<div id="transitList"></div>
</div>

</div>

<div>

<div class="card" id="detailsCard">
<div class="section-title">
<span>📦 Détails</span>
<span class="small" id="selectedHint">Sélectionne un colis</span>
</div>

<div id="shipmentDetails">Aucun colis sélectionné</div>
<div id="map"></div>

<div class="actionsRow">
<button class="btn gold full" id="mainActionBtn" style="display:none;">Action</button>
</div>

</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
getFirestore, collection, query, where, onSnapshot,
doc, getDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyCIUVom1diEV4ESa3QEcICOZRv0TNSydx8",
authDomain:"ciza-logistics.firebaseapp.com",
projectId:"ciza-logistics"
});

const db = getFirestore(app);
const auth = getAuth(app);

let currentUser=null;
let selectedShipmentId=null;

let map=L.map('map').setView([-3.3731,29.9189],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

onAuthStateChanged(auth,async(user)=>{

if(!user){
location.href="login.html";
return;
}

currentUser=user;

const snap=await getDoc(doc(db,"users",user.uid));

if(!snap.exists()){
await signOut(auth);
location.href="login.html";
return;
}

const driverData=snap.data();

if(!driverData || driverData.role!=="driver" || driverData.accountStatus!=="approved"){
alert("Accès refusé");
await signOut(auth);
location.href="login.html";
return;
}

document.getElementById("driverName").textContent=driverData.fullName || "Driver";

listenShipments();

});

const logoutBtn=document.getElementById("logoutBtn");
if(logoutBtn){
logoutBtn.onclick=async()=>{
await signOut(auth);
location.href="login.html";
};
}

function renderShipmentCard(d){

return `
<div class="shipment-card" onclick="selectShipment('${d.id}')">

<div class="shipment-top">
<div>
<div class="track">${d.trackingCode || d.id}</div>
</div>
</div>

<button class="btn gold full" style="margin-top:10px;">Sélectionner</button>

</div>
`;

}

window.selectShipment=async function(id){

document.querySelectorAll(".shipment-card").forEach(c=>{
c.classList.remove("selected");
});

const el=document.querySelector(`[onclick="selectShipment('${id}')"]`);

if(el){
el.classList.add("selected");
}

selectedShipmentId=id;

const snap=await getDoc(doc(db,"shipments",id));

if(!snap.exists()) return;

const d=snap.data();

document.getElementById("shipmentDetails").innerHTML=`
<b>${d.trackingCode || id}</b><br>
📍 ${d.fromCity || ""} → ${d.toCity || ""}
`;

document.getElementById("mainActionBtn").style.display="block";

}

function listenShipments(){

const q=query(collection(db,"shipments"),where("assignedDriverId","==",currentUser.uid));

onSnapshot(q,(snap)=>{

let assigned=[];
let transit=[];

snap.forEach(docSnap=>{
const d=docSnap.data();
d.id=docSnap.id;

if(d.status==="assigned" || d.status==="picked_up"){
assigned.push(d);
}else if(d.status==="in_transit"){
transit.push(d);
}

});

document.getElementById("assignedList").innerHTML=assigned.map(renderShipmentCard).join("");
document.getElementById("transitList").innerHTML=transit.map(renderShipmentCard).join("");

document.getElementById("countAssigned").textContent=assigned.length;
document.getElementById("countTransit").textContent=transit.length;

});

}

</script>

</body>
</html>
