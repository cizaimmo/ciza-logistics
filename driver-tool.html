<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Ciza Driver Tool</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@zxing/library@0.20.0"></script>

<style>

body{
margin:0;
background:#0B0B0C;
font-family:Inter,Arial;
color:white;
display:none;
}

header{
background:#000;
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #1e1e1e;
}

.logo{
font-weight:900;
color:#D4AF37;
}

.menu button{
margin-left:8px;
background:#151517;
border:none;
padding:8px 12px;
color:white;
border-radius:8px;
cursor:pointer;
}

.container{
width:92%;
margin:auto;
margin-top:20px;
}

.card{
background:#151517;
padding:16px;
border-radius:14px;
margin-bottom:16px;
}

.shipment{
padding:12px;
border:1px solid rgba(212,175,55,.2);
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

.shipment:hover{
background:#1c1c1f;
}

.btn{
background:#D4AF37;
border:none;
padding:10px 14px;
border-radius:8px;
font-weight:800;
margin-top:8px;
cursor:pointer;
}

#map{
height:260px;
border-radius:12px;
margin-top:10px;
}

video{
width:100%;
border-radius:10px;
}

canvas{
background:white;
border-radius:8px;
}

input{
padding:8px;
width:100%;
margin-top:6px;
border-radius:6px;
border:none;
}

</style>
</head>

<body>

<header>

<div class="logo">Ciza Driver</div>

<div class="menu">

<button onclick="view('dashboard')">Dashboard</button>
<button onclick="view('scanner')">Scanner</button>
<button onclick="view('history')">Historique</button>

</div>

</header>

<div class="container">

<div id="dashboard">

<div class="card">

<h3>Colis assignés</h3>

<div id="shipmentsList"></div>

</div>

<div class="card">

<h3>Détails colis</h3>

<div id="details">Aucun colis sélectionné</div>

<button id="pickupBtn" class="btn">Pickup</button>
<button id="transitBtn" class="btn">Transit</button>
<button id="deliverBtn" class="btn">Livrer</button>

<div id="map"></div>

</div>

</div>

<div id="scanner" style="display:none">

<div class="card">

<h3>Scanner QR</h3>

<video id="scanVideo" playsinline></video>

<button class="btn" id="scanStart">Scanner</button>

</div>

</div>

<div id="delivery" style="display:none">

<div class="card">

<h3>OTP</h3>

<input id="otpInput">

</div>

<div class="card">

<h3>Signature</h3>

<canvas id="signature" width="300" height="150"></canvas>

</div>

<div class="card">

<h3>Photo preuve</h3>

<input type="file" id="photo" accept="image/*" capture="environment">

<button id="confirmDelivery" class="btn">Confirmer</button>

</div>

</div>

<div id="history" style="display:none">

<div class="card">

<h3>Historique</h3>

<div id="historyList"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"

import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"

import {
getFirestore,
collection,
query,
where,
onSnapshot,
doc,
getDoc,
updateDoc,
getDocs,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"

const firebaseConfig={

apiKey:"AIzaSyCIUVom1diEV4ESa3QEcICOZRv0TNSydx8",
authDomain:"ciza-logistics.firebaseapp.com",
projectId:"ciza-logistics"

}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)
const auth=getAuth(app)

let currentUser=null
let currentShipment=null

onAuthStateChanged(auth,async(user)=>{

if(!user){

location.href="login.html"
return

}

currentUser=user

document.body.style.display="block"

listenShipments()

})

function view(v){

["dashboard","scanner","history","delivery"].forEach(id=>{

document.getElementById(id).style.display="none"

})

document.getElementById(v).style.display="block"

}

function listenShipments(){

const q=query(
collection(db,"shipments"),
where("assignedDriverId","==",currentUser.uid)
)

onSnapshot(q,(snap)=>{

let html=""

snap.forEach(docSnap=>{

const d=docSnap.data()

html+=`
<div class="shipment" onclick="selectShipment('${docSnap.id}')">
📦 ${d.trackingCode || docSnap.id}
<br>
📍 ${d.deliveryAddress || ""}
</div>
`

})

document.getElementById("shipmentsList").innerHTML=html

})

}

window.selectShipment=async function(id){

const snap=await getDoc(doc(db,"shipments",id))

if(!snap.exists()) return

currentShipment={id:id,...snap.data()}

document.getElementById("details").innerHTML=
"<b>"+(currentShipment.trackingCode||id)+"</b>"

if(currentShipment.deliveryLat){

map.setView([currentShipment.deliveryLat,currentShipment.deliveryLng],13)

L.marker([currentShipment.deliveryLat,currentShipment.deliveryLng]).addTo(map)

}

}

document.getElementById("pickupBtn").onclick=async()=>{

if(!currentShipment) return

await updateDoc(doc(db,"shipments",currentShipment.id),{

status:"picked_up",
pickedUpAt:serverTimestamp()

})

}

document.getElementById("transitBtn").onclick=async()=>{

if(!currentShipment) return

await updateDoc(doc(db,"shipments",currentShipment.id),{

status:"in_transit",
transitAt:serverTimestamp()

})

}

document.getElementById("deliverBtn").onclick=()=>{

if(!currentShipment) return

view("delivery")

}

document.getElementById("confirmDelivery").onclick=async()=>{

if(!currentShipment) return

await updateDoc(doc(db,"shipments",currentShipment.id),{

status:"delivered",
deliveredAt:serverTimestamp()

})

alert("Livré")

view("dashboard")

}

const map=L.map('map').setView([-3.37,29.91],12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map)

let reader=null

document.getElementById("scanStart").onclick=async()=>{

reader=new ZXing.BrowserMultiFormatReader()

reader.decodeFromVideoDevice(null,document.getElementById("scanVideo"),async(result)=>{

if(!result) return

const code=result.getText()

let found=null

const docSnap=await getDoc(doc(db,"shipments",code))

if(docSnap.exists()){

found=code

}else{

const q=query(collection(db,"shipments"),where("trackingCode","==",code))

const s=await getDocs(q)

if(!s.empty) found=s.docs[0].id

}

if(found){

selectShipment(found)
view("dashboard")

}else{

await addDoc(collection(db,"assignmentRequests"),{

trackingCode:code,
driverId:currentUser.uid,
status:"pending",
createdAt:serverTimestamp()

})

alert("Demande assignation envoyée")

}

})

}

navigator.geolocation.watchPosition((pos)=>{

if(!currentShipment) return

updateDoc(doc(db,"shipments",currentShipment.id),{

lastDriverLocation:{
lat:pos.coords.latitude,
lng:pos.coords.longitude,
timestamp:serverTimestamp()
}

})

})

const canvas=document.getElementById("signature")
const ctx=canvas.getContext("2d")

let drawing=false

canvas.onmousedown=()=>drawing=true
canvas.onmouseup=()=>drawing=false
canvas.onmousemove=(e)=>{

if(!drawing) return

ctx.lineWidth=2
ctx.lineCap="round"
ctx.strokeStyle="black"

ctx.lineTo(e.offsetX,e.offsetY)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(e.offsetX,e.offsetY)

}

</script>

</body>
</html>
