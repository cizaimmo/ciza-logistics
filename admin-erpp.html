<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ciza Logistics ERP</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

:root{

--gold:#D4AF37;
--black:#0b0b0c;
--soft:#121214;
--card:#151518;

--border:rgba(212,175,55,0.25);

--text:#ffffff;
--muted:#9a9aa3;

--good:#1f9d55;
--warn:#ffb020;
--bad:#d64545;

--radius:16px;

}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Inter;
background:var(--black);
color:var(--text);
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:260px;
background:#000;
border-right:1px solid var(--border);
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
display:flex;
align-items:center;
gap:10px;
margin-bottom:30px;
}

.logo img{height:36px;}

.menu{
display:flex;
flex-direction:column;
gap:8px;
}

.menu a{
padding:10px 12px;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.menu a:hover{
background:rgba(212,175,55,0.10);
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
height:60px;
border-bottom:1px solid var(--border);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:#000;
}

.content{
flex:1;
overflow:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
}

.kpi{
background:#0c0c0e;
border:1px solid var(--border);
border-radius:14px;
padding:14px;
text-align:center;
}

.kpi b{
font-size:22px;
color:var(--gold);
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:16px;
padding:18px;
}

.small{
font-size:12px;
color:var(--muted);
}

button{
background:var(--gold);
border:none;
padding:10px 14px;
border-radius:10px;
font-weight:800;
cursor:pointer;
}

button.secondary{
background:transparent;
border:1px solid var(--border);
color:var(--gold);
}

button.danger{
background:var(--bad);
color:#fff;
}

</style>

</head>

<body><div class="sidebar">

<div class="logo">

<img src="https://raw.githubusercontent.com/cizaimmo/ciza-logistics/36a74fd15445fd6024a274a4e4be8a0fce0cc2f8/logo.png">

<div>
<b style="color:#D4AF37">Ciza Logistics</b>
<div class="small">ERP Command Center</div>
</div>

</div>

<div class="menu">

<a onclick="openView('dashboard')">Dashboard</a>
<a onclick="openView('operations')">Operations Center</a>
<a onclick="openView('dispatch')">Dispatch</a>
<a onclick="openView('analytics')">Analytics</a>

</div>

</div>

<div class="main">

<div class="header">

<b style="color:#D4AF37">Ciza Logistics ERP</b>

<div>
🕒 <span id="erpClock">--:--</span>
</div>

</div>

<div class="content">

<div id="view-dashboard" class="view">

<div class="grid">

<div class="kpi">
<b id="kpiShipments">0</b>
<div class="small">Shipments</div>
</div>

<div class="kpi">
<b id="kpiDrivers">0</b>
<div class="small">Drivers Online</div>
</div>

<div class="kpi">
<b id="kpiTransit">0</b>
<div class="small">Transit</div>
</div>

<div class="kpi">
<b id="kpiDelivered">0</b>
<div class="small">Delivered</div>
</div>

</div>

</div><div id="view-operations" class="view" style="display:none">

<div class="card">

<b style="color:#D4AF37">Operations Center</b>

<div id="operationsMap"
style="height:520px;margin-top:10px;border-radius:16px">
</div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let operationsMap;
let driverMarkers=[];
let heatPoints=[];

function initMap(){

operationsMap=L.map("operationsMap")
.setView([-3.3822,29.3644],12);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(operationsMap);

}

setTimeout(initMap,600);

</script><script>

function calculateETA(distanceKm){

const avgSpeed=40;

const hours=distanceKm/avgSpeed;

return Math.round(hours*60);

}

function smartDispatch(shipment,drivers){

let bestDriver=null;
let bestScore=999999;

drivers.forEach(d=>{

const distance=Math.abs(
(d.lat-shipment.lat)+(d.lng-shipment.lng)
);

const load=d.activeShipments||0;

const score=distance+(load*2);

if(score<bestScore){

bestScore=score;
bestDriver=d;

}

});

return bestDriver;

}

</script><script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({

apiKey:"AIzaSyCIUVom1diEV4ESa3QEcICOZRv0TNSydx8",
authDomain:"ciza-logistics.firebaseapp.com",
projectId:"ciza-logistics"

});

const db=getFirestore(app);

/* shipments */

onSnapshot(collection(db,"shipments"),snap=>{

let total=0;

snap.forEach(doc=>{

const d=doc.data();

total++;

if(d.lat && d.lng){

heatPoints.push([d.lat,d.lng]);

}

});

document.getElementById("kpiShipments").innerText=total;

});

/* drivers */

const driversQuery=query(
collection(db,"users"),
where("role","==","driver")
);

onSnapshot(driversQuery,snap=>{

let online=0;

driverMarkers.forEach(m=>operationsMap.removeLayer(m));
driverMarkers=[];

snap.forEach(doc=>{

const d=doc.data();

if(d.isOnline) online++;

if(d.lat && d.lng){

const marker=L.marker([d.lat,d.lng])
.addTo(operationsMap)
.bindPopup(d.fullName);

driverMarkers.push(marker);

}

});

document.getElementById("kpiDrivers").innerText=online;

});

/* clock */

function updateClock(){

const now=new Date();

document.getElementById("erpClock")
.innerText=now.toLocaleTimeString("fr-FR");

}

setInterval(updateClock,1000);
updateClock();

</script>

</div>
</div>

</body>
</html>
