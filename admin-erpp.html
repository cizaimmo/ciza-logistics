<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CizaLogistics Mission Control</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:#0B0B0C;
color:white;
}

header{
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
background:#151517;
border-bottom:1px solid #202022;
}

.logo{
font-size:20px;
font-weight:900;
color:#D4AF37;
}

.kpi-container{
display:flex;
gap:18px;
}

.kpi{
background:#1b1b1e;
padding:10px 16px;
border-radius:8px;
text-align:center;
font-size:12px;
}

.kpi span{
display:block;
font-size:20px;
font-weight:800;
margin-top:4px;
}

.container{
display:flex;
height:calc(100vh - 70px);
}

.sidebar{
width:230px;
background:#151517;
padding:20px;
border-right:1px solid #222;
}

.sidebar button{
width:100%;
margin-bottom:10px;
padding:12px;
background:#1e1e22;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:#2a2a30;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.top{
display:flex;
height:50%;
}

.map{
flex:1;
}

#map{
height:100%;
}

.activity{
width:350px;
background:#151517;
overflow:auto;
border-left:1px solid #222;
}

.activity h3{
padding:14px;
border-bottom:1px solid #222;
}

.activity-item{
padding:12px;
border-bottom:1px solid #222;
font-size:13px;
}

.bottom{
flex:1;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#151517;
padding:12px;
text-align:left;
font-size:12px;
}

td{
padding:12px;
border-bottom:1px solid #222;
font-size:13px;
}

.status{
padding:4px 10px;
border-radius:20px;
font-size:11px;
font-weight:700;
}

.request{background:#444}
.quote_sent{background:#7a5200}
.quote_accepted{background:#2954ff}
.assigned{background:#2954ff}
.picked_up{background:#c9a100}
.in_transit{background:#8a00b2}
.delivered{background:#009944}

</style>
</head>

<body>

<header>

<div class="logo">
CIZA LOGISTICS — MISSION CONTROL
</div>

<div class="kpi-container">

<div class="kpi">
Shipments
<span id="kpiTotal">0</span>
</div>

<div class="kpi">
Assigned
<span id="kpiAssigned">0</span>
</div>

<div class="kpi">
Transit
<span id="kpiTransit">0</span>
</div>

<div class="kpi">
Delivered
<span id="kpiDelivered">0</span>
</div>

</div>

</header>

<div class="container">

<div class="sidebar">

<button onclick="filterType('all')">
Tous
</button>

<button onclick="filterType('parcel')">
Colis
</button>

<button onclick="filterType('freight')">
Freight entreprise
</button>

</div>

<div class="main">

<div class="top">

<div class="map">
<div id="map"></div>
</div>

<div class="activity">

<h3>Activité Live</h3>

<div id="activityFeed"></div>

</div>

</div>

<div class="bottom">

<table>

<thead>

<tr>

<th>ID</th>
<th>Type</th>
<th>Client</th>
<th>Pickup</th>
<th>Destination</th>
<th>Driver</th>
<th>Status</th>

</tr>

</thead>

<tbody id="shipmentsTable"></tbody>

</table>

</div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"

import {
getFirestore,
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"

const firebaseConfig = {

apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"

}

const app=initializeApp(firebaseConfig)

const db=getFirestore(app)

const map=L.map("map").setView([-3.38,29.36],12)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)

const shipmentsRef=collection(db,"shipments")

onSnapshot(shipmentsRef,(snapshot)=>{

let total=0
let assigned=0
let transit=0
let delivered=0

const table=document.getElementById("shipmentsTable")
const activity=document.getElementById("activityFeed")

table.innerHTML=""

snapshot.forEach(doc=>{

const s=doc.data()

total++

if(s.status==="assigned")assigned++
if(s.status==="in_transit")transit++
if(s.status==="delivered")delivered++

table.innerHTML+=`

<tr>

<td>${doc.id}</td>
<td>${s.shipmentType}</td>
<td>${s.clientName||"-"}</td>
<td>${s.pickupAddress||"-"}</td>
<td>${s.deliveryAddress||"-"}</td>
<td>${s.assignedDriverName||"-"}</td>

<td>

<span class="status ${s.status}">
${s.status}
</span>

</td>

</tr>

`

activity.innerHTML=`

<div class="activity-item">

Shipment ${doc.id} : ${s.status}

</div>

`+activity.innerHTML

if(s.location){

L.marker([s.location.lat,s.location.lng]).addTo(map)

}

})

document.getElementById("kpiTotal").innerText=total
document.getElementById("kpiAssigned").innerText=assigned
document.getElementById("kpiTransit").innerText=transit
document.getElementById("kpiDelivered").innerText=delivered

})

</script>

</body>
</html>
